name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # Run the full test suite first — deploy only proceeds if tests pass.
  test:
    name: Lint, TypeCheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Test
        run: npm test

  # Deploy to Fly.io — only runs after test job succeeds, only on main.
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Deploy the "Ask the Agent" Lambda via SST — runs after tests pass, only on main.
  # One-time manual setup: `sst secret set GroqApiKey <value> --stage prod`, and set
  # the resulting Function URL as the Fly secret NEXT_PUBLIC_AGENT_URL.
  deploy-lambda:
    name: Deploy Lambda (SST)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install infra deps
        working-directory: infra
        run: npm install

      - name: Deploy Lambda (SST)
        working-directory: infra
        run: npx sst deploy --stage prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-central-1
